body::after{
  content:'';position:fixed;inset:0;z-index:-1;
  background:linear-gradient(120deg,rgba(4,11,24,0.88) 0%,rgba(4,11,24,0.5) 45%,rgba(4,11,24,0.85) 100%);
}
/* ==================== Header ==================== */
#header{
  height:var(--header-h);display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;background:rgba(4,11,24,0.7);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--glass-bor);position:relative;z-index:10;
}
#header-title{
  font-size:clamp(13px,2.2vw,20px);font-weight:700;color:var(--teal);
  text-shadow:0 0 20px rgba(61,214,204,0.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#header-sub{font-size:10px;font-style:italic;color:var(--gold);margin-top:2px}
.header-left{display:flex;flex-direction:column;min-width:0}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lang-wrap{position:relative}
#lang-menu{
  position:absolute;right:0;top:calc(100% + 8px);z-index:40;
  min-width:184px;padding:6px;border-radius:12px;
  background:rgba(6,21,37,0.98);border:1px solid var(--glass-bor);
  box-shadow:0 12px 30px rgba(0,0,0,0.5);
  display:flex;flex-direction:column;gap:2px;
}
#lang-menu[hidden]{display:none}
.lang-opt{padding:9px 12px;border-radius:8px;font-size:13px;color:var(--silver);
  cursor:pointer;white-space:nowrap;transition:background 0.15s;user-select:none}
.lang-opt:hover{background:rgba(61,214,204,0.15);color:var(--teal)}
.lang-opt.active{background:rgba(61,214,204,0.22);color:var(--teal);font-weight:700}
#lang-toggle.active{box-shadow:0 0 0 2px var(--teal)}
/* ==================== Buttons ==================== */
.btn{
  font-family:inherit;font-size:12px;font-weight:600;
  padding:7px 14px;border-radius:8px;border:1px solid var(--glass-bor);
  background:rgba(6,21,37,0.8);color:var(--silver);cursor:pointer;
  transition:all 0.2s;white-space:nowrap;backdrop-filter:blur(8px);
}
.btn:hover{background:rgba(61,214,204,0.15);border-color:var(--teal);color:var(--white)}
.btn:active{transform:scale(0.96)}
.btn-icon{padding:7px 10px;font-size:16px}
.btn-danger:hover{background:rgba(255,107,138,0.15);border-color:var(--red-warn);color:var(--red-warn)}
/* ==================== Main Layout ==================== */
#app{height:100vh;display:flex;flex-direction:column}
.panels{
  flex:1;display:grid;
  grid-template-columns:var(--side-w) 1fr var(--side-w);
  gap:var(--panel-gap);padding:var(--panel-gap);min-height:0;
}
/* ==================== Glass Panels ==================== */
.panel{
  background:rgba(6,21,37,0.65);backdrop-filter:blur(14px);
  border:1px solid var(--glass-bor);border-radius:var(--radius);
  display:flex;flex-direction:column;overflow:hidden;
}
.panel-header{
  padding:12px 16px 8px;font-size:14px;font-weight:700;
  display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.panel-divider{height:1px;margin:0 16px 8px;background:var(--glass-bor);flex-shrink:0}
/* ==================== Left Panel - Inventory ==================== */
#panel-inventory .panel-header{color:var(--gold)}
#panel-inventory .panel-body{flex:1;overflow-y:auto;padding:4px 12px}
.prize-row{padding:8px 4px;border-bottom:1px solid rgba(255,255,255,0.04)}
.prize-row:last-child{border-bottom:none}
.prize-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.prize-emoji{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.prize-name{font-size:12px;font-weight:600;color:var(--white);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prize-count{font-size:11px;color:var(--silver);font-weight:700;flex-shrink:0}
.prize-count.warn{color:var(--red-warn)}
.prize-bar{height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden}
.prize-bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease}
.edit-stock-btn{
  margin:8px 12px;padding:8px;border-radius:var(--radius-sm);
  background:rgba(245,212,120,0.1);border:1px solid var(--gold-dim);
  color:var(--gold);font-size:12px;font-weight:600;cursor:pointer;text-align:center;
  transition:all 0.2s;flex-shrink:0;
}
.edit-stock-btn:hover{background:rgba(245,212,120,0.2)}
/* ==================== Center Panel - Wheel ==================== */
#panel-wheel{align-items:center;justify-content:center;gap:12px;padding:16px}
#wheel-container{position:relative;display:flex;align-items:center;justify-content:center;flex:1;min-height:0}
#wheelCanvas{max-width:100%;max-height:100%;cursor:pointer}
#wheelPointer{
  position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  width:48px;height:56px;z-index:7;pointer-events:none;
  filter:drop-shadow(0 0 10px rgba(245,212,120,0.95)) drop-shadow(0 0 3px rgba(255,255,255,0.9));
  animation:pointer-glow 1.6s ease-in-out infinite;
}
#wheelPointer svg{width:100%;height:100%;display:block}
@keyframes pointer-glow{
  0%,100%{filter:drop-shadow(0 0 8px rgba(245,212,120,0.8)) drop-shadow(0 0 2px rgba(255,255,255,0.7))}
  50%{filter:drop-shadow(0 0 18px rgba(245,212,120,1)) drop-shadow(0 0 6px rgba(255,255,255,1))}
}
/* center-line guide under pointer */
#wheelPointer::after{
  content:'';position:absolute;left:50%;top:50px;transform:translateX(-50%);
  width:4px;height:18px;border-radius:3px;background:linear-gradient(to bottom,rgba(245,212,120,0.9),rgba(245,212,120,0));
  filter:drop-shadow(0 0 4px rgba(245,212,120,0.9));
}
#spinBtn{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:90px;height:90px;border-radius:50%;border:none;cursor:pointer;
  background:radial-gradient(circle at 35% 35%,#0D1F30,#061525);
  border:2px solid var(--teal-dim);color:var(--teal);
  font-weight:700;z-index:6;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  transition:transform 0.15s;
  animation:orb-pulse 2.5s ease-in-out infinite;
}
#spinBtn:hover{transform:translate(-50%,-50%) scale(1.06)}
#spinBtn:active{transform:translate(-50%,-50%) scale(0.94)}
#spinBtn:disabled{opacity:0.5;cursor:not-allowed;animation:none}
#spinBtn .spin-icon{font-size:18px;line-height:1}
#spinBtn #spinLabel{font-size:11px;line-height:1.15;letter-spacing:0.5px;text-align:center}
@keyframes orb-pulse{
  0%,100%{box-shadow:0 0 14px rgba(61,214,204,0.4),0 0 28px rgba(27,140,136,0.2)}
  50%{box-shadow:0 0 22px rgba(95,240,232,0.6),0 0 44px rgba(61,214,204,0.3)}
}
#result-area{
  width:100%;max-width:440px;padding:14px 20px;border-radius:var(--radius);
  background:rgba(4,17,30,0.7);border:1px solid var(--glass-bor);
  text-align:center;font-size:16px;font-weight:700;min-height:52px;
  display:flex;align-items:center;justify-content:center;transition:all 0.3s;flex-shrink:0;
}
/* ===== Win result (enlarged) ===== */
#result-area.win{flex-direction:column;gap:2px;padding:18px 20px;font-size:0;
  border-width:2px;box-shadow:0 0 26px var(--glow-c,rgba(61,214,204,0.45));
  animation:result-pop 0.5s cubic-bezier(.2,1.4,.4,1);}
#result-area.win .r-emoji{font-size:54px;line-height:1;animation:emoji-bounce 0.6s ease}
#result-area.win .r-name{font-size:23px;font-weight:800;color:var(--glow-c,#3DD6CC);word-break:break-word}
#result-area.win .r-tag{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--gold);opacity:0.95}
@keyframes result-pop{0%{transform:scale(0.7);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes emoji-bounce{0%{transform:scale(0.3) rotate(-15deg)}70%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
/* ===== Win overlay (centered, enlarged) ===== */
#win-overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;
  background:rgba(2,8,18,0.74);backdrop-filter:blur(4px);
  opacity:0;visibility:hidden;transition:opacity 0.35s,visibility 0.35s;cursor:pointer;}
#win-overlay.show{opacity:1;visibility:visible}
#win-overlay .wo-card{text-align:center;padding:32px 44px;border-radius:26px;cursor:default;
  background:rgba(6,21,37,0.94);border:2px solid var(--glow-c,#3DD6CC);
  box-shadow:0 0 44px var(--glow-c,rgba(61,214,204,0.5));
  transform:scale(0.6);transition:transform 0.42s cubic-bezier(.2,1.5,.4,1);}
#win-overlay.show .wo-card{transform:scale(1)}
#win-overlay .wo-emoji{font-size:100px;line-height:1;animation:emoji-bounce 0.7s ease}
#win-overlay .wo-tag{font-size:15px;font-weight:700;letter-spacing:3px;color:var(--gold);margin-top:8px}
#win-overlay .wo-name{font-size:30px;font-weight:800;margin-top:10px;color:var(--glow-c,#3DD6CC);word-break:break-word}
#win-overlay .wo-hint{font-size:12px;color:#9CA3AF;margin-top:16px}
/* ==================== Right Panel - History ==================== */
#panel-history .panel-header{color:var(--gold)}
#panel-history .panel-sub{padding:0 16px 6px;font-size:10px;color:var(--purple);letter-spacing:1px}
#panel-history .panel-body{flex:1;overflow-y:auto;padding:4px 12px}
.history-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:6px;color:#7C8DA6;font-size:13px;text-align:center}
.history-item{
  display:flex;align-items:center;gap:8px;padding:8px;border-radius:var(--radius-sm);
  margin-bottom:6px;background:rgba(7,21,37,0.6);border:1px solid rgba(255,255,255,0.04);
  transition:all 0.2s;
}
.history-item:hover{border-color:var(--glass-bor)}
.history-item.miss{opacity:0.6}
.history-idx{font-size:10px;font-weight:700;color:var(--silver);min-width:36px}
.history-emoji{font-size:18px}
.history-info{flex:1;min-width:0}
.history-name{font-size:12px;font-weight:600;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-time{font-size:9px;color:#6B7280}
.history-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0}
/* ==================== Mobile Tabs ==================== */
.mobile-tabs{display:none;gap:4px;padding:0 12px 8px}
.mobile-tab{
  flex:1;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--glass-bor);
  background:rgba(6,21,37,0.6);color:var(--silver);font-size:13px;font-weight:600;
  cursor:pointer;text-align:center;transition:all 0.2s;
}
.mobile-tab.active{background:rgba(61,214,204,0.15);border-color:var(--teal);color:var(--white)}
/* ==================== Modal ==================== */
.modal{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal[hidden]{display:none}
.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px)}
.modal-card{
  position:relative;background:rgba(6,21,37,0.95);backdrop-filter:blur(20px);
  border:1px solid var(--glass-bor);border-radius:var(--radius);
  padding:20px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;
  box-shadow:0 8px 40px rgba(0,0,0,0.4);
}
.modal-title{font-size:16px;font-weight:700;color:var(--gold);margin-bottom:16px}
/* ==================== Stock Editor ==================== */
.stock-card{
  display:flex;flex-direction:column;gap:10px;padding:14px;
  border-radius:var(--radius-sm);background:rgba(4,17,30,0.5);
  margin-bottom:10px;border-left:4px solid var(--glass-bor);
}
.stock-head{display:flex;align-items:center;gap:8px}
.stock-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
.stock-emoji{font-size:20px;line-height:1}
.stock-headname{font-size:14px;font-weight:600;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stock-edit-row{display:flex;align-items:center;gap:8px}
.stock-num-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.stock-total-group{display:flex;align-items:center;gap:8px;margin-left:auto}
.stock-chip{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--glass-bor);
  background:rgba(61,214,204,0.08);color:var(--teal);font-size:12px;font-weight:700;
  cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.stock-chip:hover{background:rgba(61,214,204,0.2)}
.stock-chip:active{transform:scale(0.9)}
.stock-input{
  width:56px;padding:6px 8px;border-radius:8px;border:1px solid var(--glass-bor);
  background:rgba(4,11,24,0.8);color:var(--white);font-size:13px;font-weight:600;
  text-align:center;font-family:inherit;flex-shrink:0;
}
.stock-input:focus{outline:none;border-color:var(--teal)}
.stock-input.wide{flex:1;width:auto;min-width:0;text-align:left}
.np-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;padding:10px 12px;border-radius:var(--radius-sm);background:rgba(61,214,204,0.06);border:1px solid var(--glass-bor)}
.np-label{font-size:13px;font-weight:600;color:var(--white)}
.np-input{width:64px;padding:6px 8px;border-radius:8px;border:1px solid var(--glass-bor);background:rgba(4,11,24,0.8);color:var(--white);font-size:13px;font-weight:600;text-align:center;font-family:inherit}
.np-input:focus{outline:none;border-color:var(--teal)}
.np-unit{font-size:14px;font-weight:700;color:var(--teal)}
.np-hint{font-size:11px;color:var(--silver)}
.stock-label{font-size:12px;color:var(--silver);width:48px;text-align:right;flex-shrink:0;font-weight:600}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap}
/* ==================== Stats ==================== */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{padding:12px;border-radius:var(--radius-sm);background:rgba(4,17,30,0.5);text-align:center}
.stat-value{font-size:24px;font-weight:700;color:var(--teal)}
.stat-label{font-size:10px;color:var(--silver);margin-top:4px}
.stats-table{width:100%;border-collapse:collapse;font-size:12px}
.stats-table th{text-align:left;padding:6px 8px;color:var(--gold);font-size:11px;border-bottom:1px solid var(--glass-bor)}
.stats-table td{padding:6px 8px;color:var(--silver);border-bottom:1px solid rgba(255,255,255,0.04)}
.stats-table .won{color:var(--teal)}
/* ==================== Snackbar ==================== */
#snackbar{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);
  background:rgba(6,21,37,0.95);backdrop-filter:blur(12px);
  border:1px solid var(--teal);border-radius:var(--radius-sm);
  padding:12px 20px;display:flex;align-items:center;gap:12px;
  z-index:200;transition:transform 0.3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
#snackbar.show{transform:translateX(-50%) translateY(0)}
#snackbar .btn{padding:5px 12px;font-size:11px}
/* ==================== Settings Menu ==================== */
#menu-dropdown{
  position:absolute;top:calc(var(--header-h) - 4px);right:12px;
  background:rgba(6,21,37,0.97);backdrop-filter:blur(16px);
  border:1px solid var(--glass-bor);border-radius:var(--radius-sm);
  padding:6px;min-width:200px;z-index:50;display:none;
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
}
#menu-dropdown.show{display:block}
.menu-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;
  cursor:pointer;font-size:13px;color:var(--silver);transition:all 0.15s;
}
.menu-item:hover{background:rgba(61,214,204,0.1);color:var(--white)}
.menu-item .icon{font-size:16px;width:20px;text-align:center}
.menu-divider{height:1px;background:var(--glass-bor);margin:4px 0}
/* ==================== Scrollbar ==================== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(61,214,204,0.2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(61,214,204,0.4)}
/* ==================== Responsive ==================== */
@media(max-width:1024px){
  :root{--side-w:180px}
  .panels{grid-template-columns:var(--side-w) 1fr;grid-template-rows:1fr auto}
  #panel-history{grid-column:1 / -1;max-height:200px}
}
@media(max-width:768px){
  html,body{overflow:auto}
  #app{height:auto;min-height:100vh}
  .panels{display:flex;flex-direction:column;padding:8px;gap:8px}
  #panel-wheel{order:1;padding:12px;min-height:460px}
  .mobile-tabs{display:flex;order:2}
  #panel-inventory{order:3;display:none}
  #panel-history{order:4;display:none;max-height:none}
  #panel-inventory.show-mobile,#panel-history.show-mobile{display:flex}
  #header{padding:0 12px}
  #header-sub{display:none}
  .modal-card{margin:0;max-width:100%;max-height:90vh}
  .stock-total-group{margin-left:0;width:100%}
  #spinBtn{width:76px;height:76px}
  #spinBtn #spinLabel{font-size:9px;line-height:1.1}
}
@media(max-width:400px){
  #header-title{font-size:12px}
  .stats-grid{grid-template-columns:1fr}
}
@media(min-width:1200px){
  #wheelPointer{width:56px;height:66px}
  #spinBtn{width:100px;height:100px}
}
@media(min-width:1400px){
  :root{--side-w:260px}
}
.storage-warn{
  position:fixed;left:0;right:0;top:0;z-index:9999;
  background:#7A1F2B;color:#FFD9DE;font-size:13px;font-weight:600;
  padding:10px 16px;text-align:center;line-height:1.4;
  box-shadow:0 2px 12px rgba(0,0,0,0.4);
}
</style>
</head>
<body>
<div id="app">
  <!-- ==================== Header ==================== -->
  <header id="header">
    <div class="header-left">
      <div id="header-title" data-i18n="headerTitle"></div>
      <div id="header-sub" data-i18n="headerSubtitle"></div>
    </div>
    <div class="header-right">
      <div class="lang-wrap">
        <button class="btn btn-icon" id="lang-toggle" title="Language" aria-haspopup="true">&#x1F310;</button>
        <div class="lang-menu" id="lang-menu" hidden>
          <div class="lang-opt" data-lang="bi">&#x1F310;  &#x4E2D;&#x82F1; / Bilingual</div>
          <div class="lang-opt" data-lang="th">&#x1F1F9;&#x1F1F7;  &#x0E44;&#x0E17;&#x0E22;</div>
          <div class="lang-opt" data-lang="vi">&#x1F1FB;&#x1F1F3;  Ti&#x1EBF;ng Vi&#x1EC7;t</div>
        </div>
      </div>
      <button class="btn btn-icon" id="menu-btn" title="Menu">&#x2699;&#xFE0F;</button>
      <div id="menu-dropdown">
        <div class="menu-item" id="menu-import"><span class="icon">&#x1F4E5;</span><span data-i18n="importJson"></span></div>
        <div class="menu-item" id="menu-export"><span class="icon">&#x1F4E4;</span><span data-i18n="exportJson"></span></div>
        <div class="menu-item" id="menu-csv"><span class="icon">&#x1F4CA;</span><span data-i18n="exportCsv"></span></div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="menu-stats"><span class="icon">&#x1F4C8;</span><span data-i18n="statistics"></span></div>
        <div class="menu-item" id="menu-clear-history"><span class="icon">&#x1F5D1;</span><span data-i18n="clearHistory"></span></div>
        <div class="menu-item" id="menu-reset-all"><span class="icon">&#x1F504;</span><span data-i18n="resetAll"></span></div>
      </div>
    </div>
  </header>

  <!-- ==================== Main Panels ==================== -->
  <main class="panels">
    <!-- Left: Inventory -->
    <section class="panel" id="panel-inventory">
      <div class="panel-header" data-i18n="inventoryTitle"></div>
      <div class="panel-divider"></div>
      <div class="panel-body" id="inventory-body"></div>
      <div class="edit-stock-btn" id="edit-stock-btn" data-i18n="editStock"></div>
    </section>

    <!-- Center: Wheel -->
    <section class="panel" id="panel-wheel">
      <div id="wheel-container">
        <div id="wheelPointer">
          <svg viewBox="0 0 48 56" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="24" cy="12" rx="20" ry="10" fill="#F5D478" stroke="#FFFFFF" stroke-width="2.5"/>
            <polygon points="24,54 6,14 42,14" fill="#F5D478" stroke="#FFFFFF" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="24" cy="12" r="5" fill="#061525"/>
          </svg>
        </div>
        <canvas id="wheelCanvas" width="360" height="360"></canvas>
        <button id="spinBtn">
          <span class="spin-icon">&#x2726;</span>
          <span id="spinLabel"></span>
        </button>
      </div>
      <div id="result-area" data-i18n="tapToDraw"></div>
    </section>

    <!-- Right: History -->
    <section class="panel" id="panel-history">
      <div class="panel-header" data-i18n="historyTitle"></div>
      <div class="panel-sub" data-i18n="livePullArchive"></div>
      <div class="panel-divider"></div>
      <div class="panel-body" id="history-body"></div>
    </section>
  </main>

  <!-- Mobile Tabs -->
  <div class="mobile-tabs" id="mobile-tabs">
    <div class="mobile-tab active" data-tab="inventory" data-i18n="inventoryTitle"></div>
    <div class="mobile-tab" data-tab="history" data-i18n="historyTitle"></div>
  </div>
</div>

<!-- ==================== Stock Editor Modal ==================== -->
<div class="modal" id="stock-modal" hidden>
  <div class="modal-backdrop" data-close="stock-modal"></div>
  <div class="modal-card">
    <div class="modal-title" data-i18n="stockEditor"></div>
    <div class="np-row">
      <label class="np-label" data-i18n="noPrizeProbLabel"></label>
      <input type="number" id="np-prob" class="np-input" min="0" max="100" value="20" />
      <span class="np-unit">%</span>
      <span class="np-hint" data-i18n="noPrizeProbHint"></span>
    </div>
    <div id="stock-rows"></div>
    <div class="modal-actions">
      <button class="btn" id="stock-restore-names" style="background:rgba(250,204,21,0.12);border-color:var(--gold);color:var(--gold)" data-i18n="restoreNames"></button>
      <button class="btn btn-danger" id="stock-reset" data-i18n="resetToInitial"></button>
      <button class="btn" data-close="stock-modal" data-i18n="cancel"></button>
      <button class="btn" id="stock-save" style="background:rgba(61,214,204,0.15);border-color:var(--teal);color:var(--teal)" data-i18n="save"></button>
    </div>
  </div>
</div>

<!-- ==================== Stats Modal ==================== -->
<div class="modal" id="stats-modal" hidden>
  <div class="modal-backdrop" data-close="stats-modal"></div>
  <div class="modal-card">
    <div class="modal-title" data-i18n="statistics"></div>
    <div class="stats-grid" id="stats-grid"></div>
    <table class="stats-table" id="stats-table"></table>
    <div class="modal-actions">
      <button class="btn" data-close="stats-modal" data-i18n="close"></button>
    </div>
  </div>
</div>

<!-- ==================== Import Modal ==================== -->
<div class="modal" id="import-modal" hidden>
  <div class="modal-backdrop" data-close="import-modal"></div>
  <div class="modal-card" style="max-width:400px">
    <div class="modal-title" data-i18n="importJson"></div>
    <p style="font-size:13px;color:var(--silver);margin-bottom:16px" data-i18n="importHint"></p>
    <input type="file" id="import-file" accept=".json" style="display:none" />
    <div class="modal-actions">
      <button class="btn" data-close="import-modal" data-i18n="cancel"></button>
      <button class="btn" id="import-pick" style="background:rgba(61,214,204,0.15);border-color:var(--teal);color:var(--teal)" data-i18n="selectFile"></button>
    </div>
  </div>
</div>

<!-- ==================== Snackbar ==================== -->
<div id="snackbar">
  <span id="snackbar-text"></span>
  <button class="btn" id="snackbar-action"></button>
</div>

  if(curLang === 'bi') return item.zh + '  /  ' + item.en;
  if(curLang === 'th') return item.th || item.zh;
  if(curLang === 'vi') return item.vi || item.zh;
  return item.zh;
}
// Current-language editable prize name (for the single stock-editor input)
function curPrizeName(p){
  if(curLang === 'th') return (p.th && p.th.short) || p.zh.short;
  if(curLang === 'vi') return (p.vi && p.vi.short) || p.zh.short;
  return p.zh.short;   // bi -> Chinese (primary)
}
// HTML-safe escaping for user-editable text
function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
// Truncate a wheel label to n chars (adds ellipsis)
// Wrap a label into at most 2 lines (no truncation). Breaks at a space near
// the midpoint when possible, otherwise hard-splits at maxPerLine.
function wrapLabel(text, maxPerLine){
  text = String(text == null ? '' : text);
  if(text.length <= maxPerLine) return [text];
  const mid = Math.floor(text.length / 2);
  let sp = text.lastIndexOf(' ', mid);
  if(sp <= 0) sp = text.indexOf(' ', mid);
  if(sp > 0 && sp < text.length - 1){
    const a = text.slice(0, sp).trim();
    const b = text.slice(sp + 1).trim();
    if(a.length <= maxPerLine && b.length <= maxPerLine) return [a, b];
  }
  return [text.slice(0, maxPerLine), text.slice(maxPerLine)];
}

/* ==================== State ==================== */
const state = {
  prizes: [],
  history: [],
  noPrizeProb: 20,   // probability (%) of the "No Prize" outcome; 0 = hidden
  spinning: false,
  spinStart: 0,
  spinAngle: 0,
  spinResult: null,
  landingOffset: 0,
  particles: [],
  orbPulse: 0,
  lastDraw: null,
};

/* ==================== localStorage ==================== */
function loadState(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      const data = JSON.parse(raw);
      if(data.prizes && Array.isArray(data.prizes)){
        const healNames = (data.namesVersion || 0) < NAME_VERSION;
        state.prizes = INITIAL_PRIZES.map(p => {
          const saved = data.prizes.find(s => (s.key && s.key === p.key) || (!s.key && s.short === p.en.short));
          let rebuilt;
          if(saved){
            const enShort = (saved.en && saved.en.short) || saved.short || p.en.short;
            // Do NOT fall back to the old monolingual `saved.short` for zh/th/vi:
            // legacy data only stores English in `short`, so using it for Chinese would overwrite names.
            let zhShort = (saved.zh && saved.zh.short) || p.zh.short;
            let thShort = (saved.th && saved.th.short) || (p.th ? p.th.short : '');
            let viShort = (saved.vi && saved.vi.short) || (p.vi ? p.vi.short : '');
            // Heal corrupted localStorage where Chinese was accidentally saved as English
            if(zhShort === enShort) zhShort = p.zh.short;
            rebuilt = {
              ...p,
              en:{short:enShort}, zh:{short:zhShort},
              th:{short:thShort}, vi:{short:viShort},
              total: (typeof saved.total === 'number') ? saved.total : p.total,
              remaining: (typeof saved.remaining === 'number') ? saved.remaining : p.remaining,
            };
          } else {
            rebuilt = {...p};
          }
          // Auto-adopt the latest official names (e.g. after a rename), preserving stock counts
          if(healNames){
            rebuilt.en = {short:p.en.short};
            rebuilt.zh = {short:p.zh.short};
            rebuilt.th = p.th ? {short:p.th.short} : {short:''};
            rebuilt.vi = p.vi ? {short:p.vi.short} : {short:''};
          }
          return rebuilt;
        });
        state.history = data.history || [];
        state.noPrizeProb = (typeof data.noPrizeProb === 'number') ? Math.min(100, Math.max(0, data.noPrizeProb)) : 20;
        return;
      }
    }
  } catch(e){ console.error('Load error:', e); }
  state.prizes = INITIAL_PRIZES.map(p => ({...p}));
  state.history = [];
  state.noPrizeProb = 20;
}

function saveState(){
  const payload = {
    version: 1,
    namesVersion: NAME_VERSION,
    saved_at: new Date().toLocaleString('sv-SE').replace('T',' '),
    prizes: state.prizes.map(p => ({key:p.key, en:{short:p.en.short}, zh:{short:p.zh.short}, th:{short:p.th?p.th.short:''}, vi:{short:p.vi?p.vi.short:''}, total:p.total, remaining:p.remaining})),
    noPrizeProb: state.noPrizeProb,
    history: state.history.slice(0, HISTORY_CAP),
  };
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(payload));
  } catch(e){
    alert(t('storageFull'));
  }
}

/* ==================== Canvas Setup ==================== */
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
let canvasSize = 360;

function resizeCanvas(){
  const container = document.getElementById('wheel-container');
  const rect = container.getBoundingClientRect();
  const size = Math.min(rect.width, rect.height, 820);
  const dpr = window.devicePixelRatio || 1;
  canvasSize = Math.max(200, size - 20);
  canvas.style.width = canvasSize + 'px';
  canvas.style.height = canvasSize + 'px';
  canvas.width = canvasSize * dpr;
  canvas.height = canvasSize * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawWheel(state.spinAngle);
}

/* ==================== Sector Weights ==================== */
// Equal probability for every IN-STOCK prize; "No Prize" is a separate,
// user-configurable share (state.noPrizeProb, 0-100). When its prob is 0
// the no-prize sector disappears and the prizes split the full 100% equally.
function computeSectors(){
  const Pn = Math.min(100, Math.max(0, state.noPrizeProb || 0)); // No-Prize probability %
  const available = state.prizes.filter(p => p.remaining > 0);
  const N = available.length;
  const prizeFracTotal = (100 - Pn) / 100;      // total fraction devoted to prizes
  const perPrize = N > 0 ? prizeFracTotal / N : 0; // equal share per in-stock prize

  const sectors = [];
  state.prizes.forEach((p, i) => {
    if(p.remaining > 0){
      sectors.push({
        type:'prize', prizeIndex:i, weight:perPrize,
        fraction:perPrize, color:p.color, glow:p.glow,
        emoji:p.emoji, short:psShort(p), prize:p, soldOut:false,
      });
    } else {
      sectors.push({
        type:'prize', prizeIndex:i, weight:0,
        fraction:0, color:'#1A2A3E', glow:null,
        emoji:'\u2715', short:t('soldOut'), soldOut:true,
      });
    }
  });
  if(Pn > 0 && N > 0){
    sectors.push({
      type:'noprize', prizeIndex:-1, weight:Pn / 100,
      fraction:Pn / 100, color:'#1A2A3E', glow:null,
      emoji:'\u2715', short:t('noPrizeLabel'), soldOut:false,
    });
  }
  return {sectors, pool:1};
}

/* ==================== Draw Wheel ==================== */
function drawWheel(angleOffset){
  const cx = canvasSize / 2;
  const cy = canvasSize / 2;
  const R = canvasSize / 2 - 8;
  const hubR = Math.max(20, canvasSize * 0.07);

  ctx.clearRect(0, 0, canvasSize, canvasSize);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate((angleOffset - 90) * Math.PI / 180);

  const {sectors} = computeSectors();
  const totalWeight = sectors.reduce((s,sec) => s + sec.weight, 0);
  const minAngle = 0.02; // min radians for sold-out sectors

  let currentAngle = 0;
  sectors.forEach(sec => {
    let arc = totalWeight > 0 ? (sec.weight / totalWeight) * 2 * Math.PI : 0;
    if(arc < minAngle && !sec.soldOut) arc = 0;
    if(sec.soldOut && totalWeight === 0) arc = 2 * Math.PI / sectors.length;
    if(arc <= 0) return;

    const mid = currentAngle + arc / 2;

    // Sector fill
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, R, currentAngle, currentAngle + arc);
    ctx.closePath();
    ctx.fillStyle = sec.color;
    ctx.fill();
    ctx.strokeStyle = '#030E1C';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Glow edge
    if(sec.glow){
      ctx.beginPath();
      ctx.arc(0, 0, R - 1, currentAngle, currentAngle + arc);
      ctx.strokeStyle = sec.glow;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Labels: horizontal, upright text (counter-rotated so it never follows the wheel),
    // font auto-scaled to the sector's chord so even long Thai/Vietnamese names stay
    // fully readable and never get truncated or overflow into neighbours.
    if(arc > 0.15){
      const isBi = (curLang === 'bi') && sec.prize;
      const lines = isBi
        ? [sec.prize.zh.short].concat(wrapLabel(sec.prize.en.short, 16))
        : wrapLabel(sec.short, 16);
      const rName = R * 0.66;
      const rEmoji = R * 0.40;
      const mx = Math.cos(mid), my = Math.sin(mid);
      const chord = 2 * rName * Math.sin(arc / 2);   // horizontal space available in this wedge
      let font = canvasSize < 360 ? 12 : (canvasSize < 520 ? 15 : (canvasSize < 700 ? 17 : 20));
      ctx.font = font + 'px sans-serif';
      const maxW = Math.max.apply(null, lines.map(l => ctx.measureText(l).width));
      if(maxW > chord * 0.9) font = Math.max(8, Math.floor(font * chord * 0.9 / maxW));
      const lh = font * 1.18;
      const undo = -(angleOffset - 90) * Math.PI / 180;   // cancel wheel rotation -> text stays level

      // Emoji (inner ring, upright)
      ctx.save();
      ctx.translate(mx * rEmoji, my * rEmoji);
      ctx.rotate(undo);
      ctx.font = (canvasSize < 280 ? 22 : (canvasSize < 500 ? 30 : 36)) + 'px "Segoe UI Emoji",Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(sec.emoji, 0, 0);
      ctx.restore();

      // Name (outer ring, upright, horizontal)
      ctx.save();
      ctx.translate(mx * rName, my * rName);
      ctx.rotate(undo);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const startY = -((lines.length - 1) * lh) / 2;
      lines.forEach((l, i) => {
        ctx.font = font + 'px sans-serif';
        ctx.fillStyle = sec.soldOut ? '#7A8290'
          : (isBi && i > 0 ? 'rgba(255,255,255,0.82)' : '#FFFFFF');
        ctx.fillText(l, 0, startY + i * lh);
      });
      ctx.restore();
    }

    currentAngle += arc;
  });

  ctx.restore();

  // Hub
  ctx.beginPath();
  ctx.arc(cx, cy, hubR, 0, 2 * Math.PI);
  ctx.fillStyle = '#030E1C';
  ctx.fill();
  ctx.strokeStyle = '#3DD6CC';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Particles
  state.particles.forEach(p => p.draw(ctx));
}

/* ==================== Particles ==================== */
class Particle {
  constructor(cx, cy, color){
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    this.x = cx; this.y = cy;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - 5;
    this.gravity = 0.35;
    this.life = 1.0;
    this.decay = 0.018 + Math.random() * 0.04;
    this.r = 2 + Math.random() * 4;
    this.color = color;
  }
  update(){
    this.vx *= 0.97; this.vy *= 0.97;
    this.vy += this.gravity;
    this.x += this.vx; this.y += this.vy;
    this.life -= this.decay;
  }
  draw(ctx){
    if(this.life <= 0) return;
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1.0;
  }
}

function burstParticles(color){
  const cx = canvasSize / 2;
  const cy = canvasSize / 2;
  for(let i = 0; i < PARTICLE_COUNT; i++){
    state.particles.push(new Particle(cx, cy, color));
  }
}

function updateParticles(){
  for(let i = state.particles.length - 1; i >= 0; i--){
    state.particles[i].update();
    if(state.particles[i].life <= 0) state.particles.splice(i, 1);
  }
}

/* ==================== Draw Logic ==================== */
function preRoll(){
  const {sectors, pool} = computeSectors();
  const available = sectors.filter(s => s.weight > 0);
  if(available.length === 0) return {result:null, sectorIndex:-1};

  const roll = Math.random() * pool;
  let cum = 0;
  for(let i = 0; i < sectors.length; i++){
    cum += sectors[i].weight;
    if(roll <= cum){
      return {result:sectors[i], sectorIndex:i};
    }
  }
  // Fallback: last available sector
  const lastAvail = sectors.filter(s => s.weight > 0).pop();
  return {result:lastAvail, sectorIndex:sectors.indexOf(lastAvail)};
}

function computeLandingOffset(sectorIndex){
  const {sectors} = computeSectors();
  const totalWeight = sectors.reduce((s,sec) => s + sec.weight, 0);
  if(totalWeight <= 0) return 0;

  let cumAngle = 0;
  for(let i = 0; i < sectorIndex; i++){
    let arc = (sectors[i].weight / totalWeight) * 2 * Math.PI;
    if(arc < 0.02 && !sectors[i].soldOut) arc = 0;
    cumAngle += arc;
  }
  let sectorArc = (sectors[sectorIndex].weight / totalWeight) * 2 * Math.PI;
  if(sectorArc < 0.02 && !sectors[sectorIndex].soldOut) sectorArc = 0;
  const sectorCenter = cumAngle + sectorArc / 2;
  // Pointer is at top (0 degrees in our rotated frame = -90 in standard)
  // We want sectorCenter to align with the pointer at 0 degrees
  const offsetRad = -sectorCenter;
  const offsetDeg = offsetRad * 180 / Math.PI;
  return offsetDeg;
}

/* ==================== Spin Animation ==================== */
function startSpin(){
  if(state.spinning) return;
  const {sectors} = computeSectors();
  const hasAvailable = state.prizes.some(p => p.remaining > 0);
  if(!hasAvailable){
    setResult(t('soldOut'), '#FF6B8A');
    return;
  }

  state.spinning = true;
  state.spinStart = performance.now();
  const {result, sectorIndex} = preRoll();
  state.spinResult = result;
  state.landingOffset = computeLandingOffset(sectorIndex);
  document.getElementById('spinBtn').disabled = true;
  setResult(t('spinning'), '#3DD6CC');
  requestAnimationFrame(animate);
}

function animate(now){
  if(!state.spinning) return;
  const elapsed = now - state.spinStart;
  const progress = Math.min(elapsed / SPIN_DURATION, 1);
  const ease = 1 - Math.pow(1 - progress, 3);

  const extraRotation = 1440; // 4 full spins
  const targetAngle = extraRotation + state.landingOffset;
  state.spinAngle = ease * targetAngle;

  drawWheel(state.spinAngle);
  updateParticles();

  if(progress < 1){
    requestAnimationFrame(animate);
  } else {
    finishSpin();
  }
}

function finishSpin(){
  state.spinning = false;
  document.getElementById('spinBtn').disabled = false;
  const res = state.spinResult;

  if(!res || res.type === 'noprize'){
    setResult(t('noPrize'), '#6B7280');
    addHistory(null);
    state.lastDraw = null;
  } else if(res.type === 'prize' && res.prizeIndex >= 0){
    const prize = state.prizes[res.prizeIndex];
    if(prize.remaining > 0){
      prize.remaining--;
      const color = prize.color;
      // 中奖结果只由居中弹窗展示，避免下方 result-area 同时出现重复中奖提示
      setResult(t('tapToDraw'), '#3DD6CC');
      showWinOverlay(prize);
      addHistory(prize);
      burstParticles(color);
      state.lastDraw = {prizeIndex:res.prizeIndex, prevRemaining:prize.remaining + 1};
      showUndoSnackbar();
    } else {
      setResult(t('soldOut'), '#FF6B8A');
      addHistory(null);
    }
  }

  saveState();
  renderInventory();
  renderHistory();
  drawWheel(state.spinAngle);

  // Continue particle animation
  if(state.particles.length > 0){
    requestAnimationFrame(particleLoop);
  }
}

function particleLoop(){
  updateParticles();
  drawWheel(state.spinAngle);
  if(state.particles.length > 0){
    requestAnimationFrame(particleLoop);
  }
}

function setResult(text, color, winPrize){
  const el = document.getElementById('result-area');
  if(winPrize){
    el.innerHTML =
      '<div class="r-emoji">' + winPrize.emoji + '</div>' +
      '<div class="r-name">' + esc(ps(winPrize)) + '</div>' +
      '<div class="r-tag">' + t('won') + '</div>';
    el.style.setProperty('--glow-c', winPrize.color);
    el.style.borderColor = winPrize.color + '80';
    el.classList.add('win');
  } else {
    el.classList.remove('win');
    el.style.removeProperty('--glow-c');
    el.textContent = text;
    el.style.color = color || '#3DD6CC';
    el.style.borderColor = color ? color + '60' : 'var(--glass-bor)';
  }
}

function showWinOverlay(prize){
  const ov = document.getElementById('win-overlay');
  const card = ov.querySelector('.wo-card');
  card.style.setProperty('--glow-c', prize.color);
  ov.querySelector('.wo-emoji').textContent = prize.emoji;
  ov.querySelector('.wo-name').textContent = ps(prize);
  ov.querySelector('.wo-tag').textContent = '🎉 ' + t('congrats');
  ov.querySelector('.wo-hint').textContent = t('winHint');
  ov.classList.add('show');
  clearTimeout(state._woTimer);
  state._woTimer = setTimeout(() => hideWinOverlay(), 2800);
}

function hideWinOverlay(){
  document.getElementById('win-overlay').classList.remove('show');
  clearTimeout(state._woTimer);
  setResult(t('tapToDraw'), '#3DD6CC');
}

/* ==================== History ==================== */
function addHistory(prize){
  const idx = state.history.length + 1;
  state.history.unshift({
    idx: idx,
    en: prize ? prize.en.short : 'No Prize',
    zh: prize ? prize.zh.short : t('noPrizeLabel'),
    th: prize ? (prize.th ? prize.th.short : t('noPrizeLabel')) : t('noPrizeLabel'),
    vi: prize ? (prize.vi ? prize.vi.short : t('noPrizeLabel')) : t('noPrizeLabel'),
    emoji: prize ? prize.emoji : '\u2715',
    color: prize ? prize.color : '#6B7280',
    time: new Date().toLocaleString('sv-SE').replace('T',' '),
    won: !!prize,
  });
  if(state.history.length > HISTORY_CAP) state.history.length = HISTORY_CAP;
}

function renderHistory(){
  const body = document.getElementById('history-body');
  if(state.history.length === 0){
    body.innerHTML = '<div class="history-empty"><div style="font-size:28px;opacity:0.4">\u{1F4DC}</div><div>' + t('noPullsYet') + '</div><div style="font-size:11px;font-style:italic">' + t('noPullsSub') + '</div></div>';
    return;
  }
  const items = state.history.slice(0, 100); // show latest 100
  body.innerHTML = items.map(item =>
    '<div class="history-item' + (item.won ? '' : ' miss') + '">' +
      '<div class="history-idx">#' + String(item.idx).padStart(3,'0') + '</div>' +
      '<div class="history-emoji">' + item.emoji + '</div>' +
      '<div class="history-info">' +
        '<div class="history-name" style="color:' + (item.won ? item.color : '#9CA3AF') + '">' + esc(psHist(item)) + '</div>' +
        '<div class="history-time">' + item.time + '</div>' +
      '</div>' +
      '<div class="history-tag" style="background:' + (item.won ? item.color + '20' : 'rgba(107,114,128,0.2)') + ';color:' + (item.won ? item.color : '#6B7280') + '">' + (item.won ? t('wonTag') : t('noPrizeTag')) + '</div>' +
    '</div>'
  ).join('');
}

/* ==================== Inventory ==================== */
function renderInventory(){
  const body = document.getElementById('inventory-body');
  body.innerHTML = state.prizes.map((p, i) => {
    const pct = p.total > 0 ? Math.round(p.remaining / p.total * 100) : 0;
    const warn = p.remaining === 0;
    return '<div class="prize-row">' +
      '<div class="prize-top">' +
        '<div class="prize-emoji">' + p.emoji + '</div>' +
        '<div class="prize-name">' + esc(ps(p)) + '</div>' +
        '<div class="prize-count' + (warn ? ' warn' : '') + '">' + p.remaining + ' / ' + p.total + '</div>' +
      '</div>' +
      '<div class="prize-bar"><div class="prize-bar-fill" style="width:' + pct + '%;background:' + p.color + '"></div></div>' +
    '</div>';
  }).join('');
}

/* ==================== Stock Editor ==================== */
function openStockEditor(){
  const npInput = document.getElementById('np-prob');
  if(npInput) npInput.value = state.noPrizeProb;
  const rows = document.getElementById('stock-rows');
  const nameLabelKey = (curLang === 'bi') ? 'nameZh' : 'nameLabel';
  rows.innerHTML = state.prizes.map((p, i) =>
    '<div class="stock-card" style="border-left-color:' + p.color + '">' +
      '<div class="stock-head">' +
        '<span class="stock-dot" style="background:' + p.color + ';color:' + p.color + '"></span>' +
        '<span class="stock-emoji">' + p.emoji + '</span>' +
        '<span class="stock-headname">' + esc(psFull(p)) + '</span>' +
      '</div>' +
      '<div class="stock-edit-row">' +
        '<label class="stock-label">' + t(nameLabelKey) + '</label>' +
        '<input type="text" class="stock-input wide" data-i="' + i + '" data-field="name" value="' + esc(curPrizeName(p)) + '" maxlength="40" />' +
      '</div>' +
      '<div class="stock-num-row">' +
        '<label class="stock-label">' + t('remainingLabel') + '</label>' +
        '<button class="stock-chip" data-i="' + i + '" data-act="rem-5">\u22125</button>' +
        '<button class="stock-chip" data-i="' + i + '" data-act="rem-1">\u22121</button>' +
        '<input type="number" class="stock-input" data-i="' + i + '" data-field="remaining" value="' + p.remaining + '" min="0" />' +
        '<button class="stock-chip" data-i="' + i + '" data-act="rem+1">+1</button>' +
        '<button class="stock-chip" data-i="' + i + '" data-act="rem+5">+5</button>' +
        '<div class="stock-total-group">' +
          '<label class="stock-label">' + t('totalLabel') + '</label>' +
          '<input type="number" class="stock-input" data-i="' + i + '" data-field="total" value="' + p.total + '" min="1" />' +
        '</div>' +
      '</div>' +
    '</div>'
  ).join('');

  // Wire quick buttons
  rows.querySelectorAll('.stock-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.i);
      const act = btn.dataset.act;
      const input = rows.querySelector('input[data-i="' + i + '"][data-field="remaining"]');
      let val = parseInt(input.value) || 0;
      if(act === 'rem-5') val -= 5;
      else if(act === 'rem-1') val -= 1;
      else if(act === 'rem+1') val += 1;
      else if(act === 'rem+5') val += 5;
      val = Math.max(0, val);
      input.value = val;
    });
  });

  showModal('stock-modal');
}

function saveStock(){
  const rows = document.getElementById('stock-rows');
  const npInput = document.getElementById('np-prob');
  if(npInput){
    let np = parseInt(npInput.value);
    if(isNaN(np)) np = 0;
    state.noPrizeProb = Math.min(100, Math.max(0, np));
  }
  state.prizes.forEach((p, i) => {
    const remInput = rows.querySelector('input[data-i="' + i + '"][data-field="remaining"]');
    const totInput = rows.querySelector('input[data-i="' + i + '"][data-field="total"]');
    const nameInput = rows.querySelector('input[data-i="' + i + '"][data-field="name"]');
    let rem = parseInt(remInput.value);
    let tot = parseInt(totInput.value);
    if(isNaN(rem) || rem < 0){ rem = 0; }
    if(isNaN(tot) || tot < 1){ tot = p.total; }
    if(rem > tot) rem = tot;
    p.remaining = rem;
    p.total = tot;
    if(nameInput){
      const v = (nameInput.value || '').trim();
      if(curLang === 'th') p.th = {short: v || (p.th ? p.th.short : p.zh.short)};
      else if(curLang === 'vi') p.vi = {short: v || (p.vi ? p.vi.short : p.zh.short)};
      else p.zh = {short: v || p.zh.short};   // bi & default -> Chinese (primary)
    }
  });
  saveState();
  renderInventory();
  renderHistory();
  drawWheel(state.spinAngle);
  hideModal('stock-modal');
}

function resetStock(){
  if(!confirm(t('confirmResetStock'))) return;
  state.prizes = INITIAL_PRIZES.map(p => ({...p}));
  state.noPrizeProb = 20;
  saveState();
  renderInventory();
  drawWheel(state.spinAngle);
  hideModal('stock-modal');
}

function resetNamesToInitial(){
  // Restore only the display names (zh/en/th/vi) from INITIAL_PRIZES, preserving stock counts.
  state.prizes = state.prizes.map(p => {
    const init = INITIAL_PRIZES.find(ip => ip.key === p.key);
    if(!init) return p;
    return {
      ...p,
      en:{short:init.en.short},
      zh:{short:init.zh.short},
      th: init.th ? {short:init.th.short} : {short:''},
      vi: init.vi ? {short:init.vi.short} : {short:''},
    };
  });
  saveState();
  openStockEditor(); // refresh the inputs with restored names
  renderInventory();
  drawWheel(state.spinAngle);
}

/* ==================== Undo ==================== */
function showUndoSnackbar(){
  const sb = document.getElementById('snackbar');
  const txt = document.getElementById('snackbar-text');
  const btn = document.getElementById('snackbar-action');
  txt.textContent = t('drawUndone');
  btn.textContent = t('undo');
  btn.style.display = '';
  sb.classList.add('show');
  clearTimeout(showUndoSnackbar._timer);
  showUndoSnackbar._timer = setTimeout(() => {
    sb.classList.remove('show');
    state.lastDraw = null;
  }, 6000);
}

function undoLastDraw(){
  if(!state.lastDraw) return;
  const {prizeIndex, prevRemaining} = state.lastDraw;
  if(prizeIndex >= 0 && prizeIndex < state.prizes.length){
    state.prizes[prizeIndex].remaining = prevRemaining;
  }
  if(state.history.length > 0) state.history.shift();
  state.lastDraw = null;
  saveState();
  renderInventory();
  renderHistory();
  drawWheel(state.spinAngle);
  document.getElementById('snackbar').classList.remove('show');
}

function showSnackbar(msg, actionLabel, actionFn){
  const sb = document.getElementById('snackbar');
  const txt = document.getElementById('snackbar-text');
  const btn = document.getElementById('snackbar-action');
  txt.textContent = msg;
  if(actionLabel){
    btn.textContent = actionLabel;
    btn.style.display = '';
    btn.onclick = actionFn;
  } else {
    btn.style.display = 'none';
  }
  sb.classList.add('show');
  clearTimeout(showSnackbar._timer);
  showSnackbar._timer = setTimeout(() => sb.classList.remove('show'), 4000);
}

/* ==================== Export / Import ==================== */
function exportJSON(){
  const data = {
    version: 1,
    saved_at: new Date().toLocaleString('sv-SE').replace('T',' '),
    prizes: state.prizes.map(p => ({key:p.key, en:{short:p.en.short}, zh:{short:p.zh.short}, th:{short:p.th?p.th.short:''}, vi:{short:p.vi?p.vi.short:''}, total:p.total, remaining:p.remaining})),
    history: state.history,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ugreen_hsr_lucky_draw_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function exportCSV(){
  const headers = ['Pull #', 'Time', 'Prize', 'Emoji', 'Result', 'Color'];
  const rows = state.history.map(h => [
    h.idx, h.time, psHist(h), h.emoji, h.won ? 'WON' : 'MISS', h.color
  ].map(v => '"' + String(v).replace(/"/g, '""') + '"').join(','));
  const csv = headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'lucky_draw_history_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if(data.prizes && Array.isArray(data.prizes)){
        state.prizes = INITIAL_PRIZES.map(p => {
          const saved = data.prizes.find(s => (s.key && s.key === p.key) || (!s.key && s.short === p.en.short));
          if(saved){
            const enShort = (saved.en && saved.en.short) || saved.short || p.en.short;
            // Do NOT fall back to the old monolingual `saved.short` for zh/th/vi:
            // legacy data only stores English in `short`, so using it for Chinese would overwrite names.
            let zhShort = (saved.zh && saved.zh.short) || p.zh.short;
            let thShort = (saved.th && saved.th.short) || (p.th ? p.th.short : '');
            let viShort = (saved.vi && saved.vi.short) || (p.vi ? p.vi.short : '');
            // Heal corrupted localStorage where Chinese was accidentally saved as English
            if(zhShort === enShort) zhShort = p.zh.short;
            return {
              ...p,
              en:{short:enShort}, zh:{short:zhShort},
              th:{short:thShort}, vi:{short:viShort},
              total: (typeof saved.total === 'number') ? saved.total : p.total,
              remaining: (typeof saved.remaining === 'number') ? saved.remaining : p.remaining,
            };
          }
          return {...p};
        });
        state.history = data.history || [];
        state.noPrizeProb = (typeof data.noPrizeProb === 'number') ? Math.min(100, Math.max(0, data.noPrizeProb)) : 20;
        saveState();
        renderInventory();
        renderHistory();
        drawWheel(state.spinAngle);
        hideModal('import-modal');
        showSnackbar(t('importSuccess'));
      } else {
        alert(t('importError'));
      }
    } catch(err){
      alert(t('importError'));
    }
  };
  reader.readAsText(file);
}

/* ==================== Statistics ==================== */
function showStats(){
  const total = state.history.length;
  const wins = state.history.filter(h => h.won).length;
  const miss = total - wins;
  const rate = total > 0 ? Math.round(wins / total * 100) : 0;

  document.getElementById('stats-grid').innerHTML =
    '<div class="stat-card"><div class="stat-value">' + total + '</div><div class="stat-label">' + t('totalPulls') + '</div></div>' +
    '<div class="stat-card"><div class="stat-value" style="color:var(--gold)">' + wins + '</div><div class="stat-label">' + t('totalWins') + '</div></div>' +
    '<div class="stat-card"><div class="stat-value" style="color:#6B7280">' + miss + '</div><div class="stat-label">' + t('totalMiss') + '</div></div>' +
    '<div class="stat-card"><div class="stat-value" style="color:var(--aqua)">' + rate + '%</div><div class="stat-label">' + t('winRate') + '</div></div>';

  document.getElementById('stats-table').innerHTML =
    '<tr><th>' + t('prize') + '</th><th>' + t('distributed') + '</th><th>' + t('remaining') + '</th></tr>' +
    state.prizes.map(p => {
      const dist = p.total - p.remaining;
      return '<tr><td>' + p.emoji + ' ' + esc(ps(p)) + '</td><td class="won">' + dist + ' / ' + p.total + '</td><td>' + p.remaining + '</td></tr>';
    }).join('');

  showModal('stats-modal');
}

/* ==================== Modal Helpers ==================== */
function showModal(id){ document.getElementById(id).hidden = false; }
function hideModal(id){ document.getElementById(id).hidden = true; }

/* ==================== i18n Apply ==================== */
// Spin button label per language (1~2 lines; bilingual shows Chinese + English)
const SPIN_LABELS = { bi:['抽奖','SPIN'], zh:['抽奖'], en:['SPIN'], th:['สุ่ม'], vi:['QUAY'] };
function renderSpinLabel(){
  const el = document.getElementById('spinLabel');
  if(!el) return;
  const lines = SPIN_LABELS[curLang] || SPIN_LABELS.bi;
  el.innerHTML = lines.map(l => esc(l)).join('<br>');
}
function applyTranslations(){
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    const text = t(key);
    if(text) el.textContent = text;
  });
  document.title = 'UGREEN \u00D7 HSR Lucky Draw';
  document.querySelectorAll('.lang-opt').forEach(o => {
    o.classList.toggle('active', o.dataset.lang === curLang);
  });
  renderInventory();
  renderHistory();
  renderSpinLabel();
  drawWheel(state.spinAngle);
  setResult(t('tapToDraw'), '#3DD6CC');
}

function setLanguage(lang){
  curLang = (lang === 'bi' || lang === 'th' || lang === 'vi') ? lang : 'bi';
  document.documentElement.lang = (curLang === 'th') ? 'th'
    : (curLang === 'vi') ? 'vi'
    : 'zh-CN';
  try { localStorage.setItem('ugreen_hsr_lang', curLang); } catch(e){}
  applyTranslations();
}

/* ==================== Mobile Tabs ==================== */
function setupMobileTabs(){
  document.querySelectorAll('.mobile-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.tab;
      document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const inv = document.getElementById('panel-inventory');
      const hist = document.getElementById('panel-history');
      inv.classList.remove('show-mobile');
      hist.classList.remove('show-mobile');
      if(target === 'inventory') inv.classList.add('show-mobile');
      else hist.classList.add('show-mobile');
    });
  });
}

/* ==================== Event Listeners ==================== */
function setupEvents(){
  // SPIN button
  document.getElementById('spinBtn').addEventListener('click', startSpin);

  // Win overlay: click outside card to close
  document.getElementById('win-overlay').addEventListener('click', (e) => {
    if(e.target.id === 'win-overlay') hideWinOverlay();
  });

  // Edit stock
  document.getElementById('edit-stock-btn').addEventListener('click', openStockEditor);
  document.getElementById('stock-save').addEventListener('click', saveStock);
  document.getElementById('stock-reset').addEventListener('click', resetStock);
  document.getElementById('stock-restore-names').addEventListener('click', resetNamesToInitial);

  // Modal close
  document.querySelectorAll('[data-close]').forEach(el => {
    el.addEventListener('click', () => hideModal(el.dataset.close));
  });

  // Language toggle
  // Language dropdown
  const langToggle = document.getElementById('lang-toggle');
  const langMenu = document.getElementById('lang-menu');
  langToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    const show = langMenu.hidden;
    langMenu.hidden = !show;
    langToggle.classList.toggle('active', show);
  });
  langMenu.querySelectorAll('.lang-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      setLanguage(opt.dataset.lang);
      langMenu.hidden = true;
      langToggle.classList.remove('active');
    });
  });
  document.addEventListener('click', (e) => {
    if(!langMenu.hidden && e.target !== langToggle && !langMenu.contains(e.target)){
      langMenu.hidden = true;
      langToggle.classList.remove('active');
    }
  });

  // Menu
  const menuBtn = document.getElementById('menu-btn');
  const menuDrop = document.getElementById('menu-dropdown');
  menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    menuDrop.classList.toggle('show');
  });
  document.addEventListener('click', (e) => {
    if(!menuDrop.contains(e.target) && e.target !== menuBtn) menuDrop.classList.remove('show');
  });

  // Menu items
  document.getElementById('menu-import').addEventListener('click', () => {
    menuDrop.classList.remove('show');
    showModal('import-modal');
  });
  document.getElementById('menu-export').addEventListener('click', () => {
    menuDrop.classList.remove('show');
    exportJSON();
  });
  document.getElementById('menu-csv').addEventListener('click', () => {
    menuDrop.classList.remove('show');
    exportCSV();
  });
  document.getElementById('menu-stats').addEventListener('click', () => {
    menuDrop.classList.remove('show');
    showStats();
  });
  document.getElementById('menu-clear-history').addEventListener('click', () => {
    menuDrop.classList.remove('show');
    if(confirm(t('confirmClearHistory'))){
      state.history = [];
      saveState();
      renderHistory();
    }
  });
  document.getElementById('menu-reset-all').addEventListener('click', () => {
    menuDrop.classList.remove('show');
    if(confirm(t('confirmResetAll'))){
      state.prizes = INITIAL_PRIZES.map(p => ({...p}));
      state.history = [];
      saveState();
      renderInventory();
      renderHistory();
      drawWheel(0);
    }
  });

  // Import file
  document.getElementById('import-pick').addEventListener('click', () => {
    document.getElementById('import-file').click();
  });
  document.getElementById('import-file').addEventListener('change', (e) => {
    if(e.target.files[0]) importJSON(e.target.files[0]);
    e.target.value = '';
  });

  // Undo
  document.getElementById('snackbar-action').addEventListener('click', undoLastDraw);

  // Resize
  window.addEventListener('resize', () => {
    clearTimeout(setupEvents._resizeTimer);
    setupEvents._resizeTimer = setTimeout(resizeCanvas, 150);
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if(e.key === ' ' && !state.spinning && !e.target.matches('input,textarea')){
      e.preventDefault();
      startSpin();
    }
    if(e.key === 'Escape'){
      document.querySelectorAll('.modal:not([hidden])').forEach(m => m.hidden = true);
      menuDrop.classList.remove('show');
    }
  });
}

/* ==================== Init ==================== */
// Warn the operator if local storage is unavailable (incognito / disabled), so
// lottery data won't be lost silently during a live event.
function checkStorage(){
  try {
    const k = 'ugreen_hsr_storage_test';
    localStorage.setItem(k, '1');
    const ok = localStorage.getItem(k) === '1';
    localStorage.removeItem(k);
    if(!ok) throw new Error('unavailable');
  } catch(e){
    const bar = document.createElement('div');
    bar.className = 'storage-warn';
    bar.textContent = '⚠ 本地存储不可用（可能处于无痕/隐私模式，或浏览器禁用了存储）。抽奖数据将无法保存，请用普通浏览器窗口打开本页面。';
    document.body.insertBefore(bar, document.body.firstChild);
  }
}

function init(){
  // Load language (default: bilingual 'bi'; only bi/th/vi are active now)
  try {
    const savedLang = localStorage.getItem('ugreen_hsr_lang');
    if(savedLang && ['bi','th','vi'].includes(savedLang)){
      curLang = savedLang;
    } else if(savedLang && (savedLang === 'zh' || savedLang === 'en')){
      // Old one-language preference -> default to bilingual
      curLang = 'bi';
      try { localStorage.setItem('ugreen_hsr_lang', 'bi'); } catch(e){}
    } else if(navigator.language && navigator.language.startsWith('zh')){
      curLang = 'bi';
    }
  } catch(e){}

  // Load state
  loadState();

  // Storage availability warning
  checkStorage();

  // Setup
  setupEvents();
  setupMobileTabs();

  // Render
  setLanguage(curLang);
  resizeCanvas();
  renderInventory();
  renderHistory();
  drawWheel(0);
}

// Wait for DOM
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

  <div class="wo-card" style="--glow-c:#3DD6CC">
    <div class="wo-emoji"></div>
    <div class="wo-tag"></div>
    <div class="wo-name"></div>
    <div class="wo-hint"></div>
  </div>
</div>
</body>
